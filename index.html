<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Extrator de PDF</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>
  <h2>Extrair texto do PDF</h2>
  <input type="file" id="fileInput" />

  <script>
    // worker
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

    document.getElementById("fileInput").addEventListener("change", async function (e) {

      const file = e.target.files[0];
      if (!file) return;

      const trechoBuscado = prompt("Qual trecho deseja buscar? (ex: 20.2.2.1)");
      if (!trechoBuscado) return;

      const reader = new FileReader();

      reader.onload = async function () {
        const typedarray = new Uint8Array(this.result);

        const pdf = await pdfjsLib.getDocument(typedarray).promise;

        let textoCompleto = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();

          const strings = content.items.map(item => item.str);
          textoCompleto += strings.join(" ") + "\n";
        }

        const inicio = textoCompleto.indexOf(trechoBuscado);

        if (inicio === -1) {
          alert("Trecho não encontrado.");
          return;
        }

        let texto = textoCompleto.slice(inicio);

        // =============================
        // 🔥 FORMATAÇÃO
        // =============================
        texto = texto
          .replace(/(\d+(?:\.\d+)+)/g, "§$1§")   // protege 20.2.2.1
          .replace(/(\d+\.\d+)/g, "§$1§")        // protege 4.1
          .replace(/(\d+)\s/g, "\n$1 ")          // quebra itens
          .replace(/§/g, "")                    // restaura
          .replace(/\.([0-9]+\.[0-9]+)/g, ". $1") // espaço subitens
          .replace(/\n+/g, "\n")
          .trim();

        console.log("===== RESULTADO =====");
        console.log(texto);

        // gerar TXT
        const blob = new Blob([texto], { type: "text/plain" });
        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = "resultado.txt";
        link.click();
      };

      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
